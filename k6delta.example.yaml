# k6delta.yaml -- k6delta configuration
# Variable interpolation: ${env} and ${app} are replaced at runtime.

provider: ecs          # supported: ecs, docker-compose
region: eu-west-1      # AWS region (overridable with --region)

defaults:
  env: staging         # default --env value
  phase: smoke         # default --phase value
  results_dir: tests/performance/results

# Verdict thresholds (optional, shown with defaults):
# verdicts:
#   cpu_peak_warn: 90        # WARN if ECS CPU peak > this %
#   cpu_peak_fail: 98        # FAIL if ECS CPU peak > this %
#   error_5xx_warn: 1        # WARN if 5xx count >= this
#   error_5xx_fail: 10       # FAIL if 5xx count >= this
#   p95_regression_warn: 10  # WARN if p95 regresses > this % (compare)
#   p95_regression_fail: 25  # FAIL if p95 regresses > this % (compare)
#   error_rate_regression_warn: 50  # WARN if error rate regresses > this %

apps:
  web:
    cluster: "myapp-${env}"
    service: "myapp-web-${env}"
    asg_prefix: "myapp-${env}-ecs-"              # optional: prefix to discover ASG by name
    capacity_provider: "myapp-${env}-ec2"         # optional: for CapacityProviderReservation metric
    test_file: "tests/performance/web/${phase}.js"
    alarm_prefix: "myapp-${env}"                  # optional: for CloudWatch alarm history

  worker:
    cluster: "myapp-${env}"
    service: "myapp-worker-${env}"
    test_file: "tests/performance/worker/${phase}.js"
    # No asg_prefix, capacity_provider, or alarm_prefix -- k6delta skips those metrics

# For Docker Compose (local development):
# provider: docker-compose
# apps:
#   web:
#     compose_project: "myapp"
#     test_file: "tests/${phase}.js"

# For demo/testing (no infrastructure required):
# provider: mock
# apps:
#   web:
#     mock_scenario: "happy-path"    # happy-path, cpu-spike, scale-out, cascade-failure
#     test_file: "tests/${phase}.js"
