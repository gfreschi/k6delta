name: CI

on:
  push:
    branches: [main]
    tags-ignore: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Lint
        uses: golangci/golangci-lint-action@v9
      - name: Vulnerability check
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [stable, oldstable]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Run tests
        run: go test ./... -count=1 -race
      - name: Verify golden files are up to date
        run: |
          UPDATE_GOLDEN=1 go test ./internal/tui/... -count=1
          if ! git diff --quiet internal/tui/**/testdata/*.golden 2>/dev/null; then
            echo "::error::Golden files are out of date. Run 'make test-update' and commit the changes."
            git diff internal/tui/**/testdata/*.golden
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Cross-compile all platforms
        run: |
          for os in linux darwin; do
            for arch in amd64 arm64; do
              GOOS=$os GOARCH=$arch go build -trimpath -ldflags="-s -w" -o "k6delta-${os}-${arch}" ./cmd/k6delta
            done
          done
